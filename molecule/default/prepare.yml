---

- name: information
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: arch- / artixlinux
      when:
        - ansible_facts.distribution | lower == 'archlinux' or
          ansible_facts.os_family | lower == 'artix linux'
      block:
        - name: update pacman system
          ansible.builtin.command: |
            pacman --refresh --sync --sysupgrade --noconfirm
          register: pacman
          changed_when: pacman.rc != 0

        - name: create depends service
          ansible.builtin.copy:
            mode: "0755"
            dest: /etc/init.d/net
            content: |
              #!/usr/bin/openrc-run
              true
          when:
            - ansible_facts.os_family | lower == 'artix linux'

    - name: update package cache
      ansible.builtin.package:
        update_cache: true

    # in a container the early-boot /run/nologin is not always removed, which
    # makes pam_nologin block the per-user 'systemd --user' manager. starting
    # systemd-user-sessions clears it, mimicking a fully booted system.
    - name: clear the login barrier (systemd-user-sessions)
      ansible.builtin.systemd_service:
        name: systemd-user-sessions.service
        state: started
      when:
        - ansible_facts.service_mgr | lower == "systemd"

    - name: environment
      ansible.builtin.debug:
        msg:
          - "os family            : {{ ansible_facts.distribution }} ({{ ansible_facts.os_family }})"
          - "distribution version : {{ ansible_facts.distribution_major_version }}"
          - "ansible version      : {{ ansible_version.full }}"
          - "python version       : {{ ansible_facts.python.version.major }}.{{ ansible_facts.python.version.minor }}"
